<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FluidCast Podcast Player">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FluidCast">
  <link rel="apple-touch-icon" href="fluidcast_icon.png">

  <!-- Apple Smart App Banner (iOS/macOS Safari) -->
  <meta name="apple-itunes-app" content="app-id=6754508580">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="fluidcast_icon.png"/>
  <link rel="shortcut icon" type="image/png" href="fluidcast_icon.png"/>

  <title>FluidCast Web</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Paddle Billing v2 — used for web subscription checkout -->
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <script>
    window.FluidCastPaddle = {
      _onComplete: null,
      _onClose: null,

      init: function(token, isSandbox) {
        if (isSandbox) Paddle.Environment.set('sandbox');
        Paddle.Initialize({
          token: token,
          eventCallback: function(event) {
            console.log('[Paddle event]', event.name, event.data || '');
            if (event.name === 'checkout.completed') {
              var txnId = event.data && event.data.transaction_id;
              if (window.FluidCastPaddle._onComplete) {
                window.FluidCastPaddle._onComplete(txnId || null);
                window.FluidCastPaddle._onComplete = null;
                window.FluidCastPaddle._onClose = null;
              }
            } else if (event.name === 'checkout.closed') {
              if (window.FluidCastPaddle._onClose) {
                window.FluidCastPaddle._onClose();
                window.FluidCastPaddle._onComplete = null;
                window.FluidCastPaddle._onClose = null;
              }
            }
          }
        });
      },

      openCheckout: function(priceId, customerEmail, userId, onComplete, onClose) {
        window.FluidCastPaddle._onComplete = onComplete;
        window.FluidCastPaddle._onClose = onClose;
        var opts = {
          items: [{ priceId: priceId, quantity: 1 }],
          settings: { displayMode: 'overlay' }
        };
        if (customerEmail) opts.customer = { email: customerEmail };
        if (userId) opts.customData = { app_user_id: userId };
        console.log('[Paddle] openCheckout priceId=' + priceId + ' email=' + (customerEmail || 'none') + ' userId=' + (userId || 'none'));
        Paddle.Checkout.open(opts);
      }
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
